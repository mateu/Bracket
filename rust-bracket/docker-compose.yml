version: '3.8'

services:
  rust-bracket-api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://bracket:bracket123@postgres:5432/bracket
      - RUST_LOG=debug
    depends_on:
      - postgres
    volumes:
      - ./data:/data

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=bracket
      - POSTGRES_PASSWORD=bracket123
      - POSTGRES_DB=bracket
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # SQLite version (alternative)
  rust-bracket-sqlite:
    build: .
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=sqlite:///data/bracket.db
      - RUST_LOG=debug
    volumes:
      - ./data:/data
    profiles:
      - sqlite

volumes:
  postgres_data:

