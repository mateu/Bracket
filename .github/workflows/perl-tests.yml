name: Perl tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.36'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cpanminus \
            libdbi-perl \
            libdbd-mysql-perl \
            libdbd-sqlite3-perl \
            libexpat1-dev \
            libssl-dev \
            zlib1g-dev \
            libcatalyst-perl \
            libcatalyst-action-rest-perl \
            libcatalyst-action-renderview-perl \
            libcatalyst-plugin-configloader-perl \
            libcatalyst-plugin-static-simple-perl \
            libcatalyst-plugin-authentication-perl \
            libcatalyst-authentication-store-dbix-class-perl \
            libcatalyst-model-dbic-schema-perl \
            libcatalyst-plugin-session-state-cookie-perl \
            libcatalyst-plugin-session-store-dbic-perl \
            libcatalyst-view-tt-perl \
            libconfig-general-perl \
            libcrypt-eksblowfish-perl \
            libdatetime-perl \
            libdbix-class-perl \
            libdbix-class-encodedcolumn-perl \
            libemail-sender-perl \
            libemail-simple-perl \
            libemail-valid-perl \
            libhtml-formhandler-perl \
            libhtml-formhandler-model-dbic-perl \
            libnet-smtp-ssl-perl \
            libperl6-junction-perl \
            libsql-translator-perl \
            libterm-prompt-perl \
            libyaml-perl \
            libgetopt-long-descriptive-perl \
            libmoosex-getopt-perl

      - name: Run core Bracket regression suite against packaged stack
        env:
          PERL5LIB: ''
        run: |
          export PATH="/usr/bin:$PATH"
          prove -Ilib -It/lib -lv \
            t/ci_packaged_stack_dependencies.t \
            t/01app.t \
            t/04context.t \
            t/BracketTestSchema.t \
            t/bracket_validator.t \
            t/bracket_structure.t \
            t/completion_signal.t \
            t/continuity_audit.t \
            t/controller_Admin.t \
            t/controller_Auth.t \
            t/controller_Auth_email_link.t \
            t/controller_Region.t \
            t/deploy_bracket_mysql_postdeploy.t \
            t/edit_cutoff_time.t \
            t/equity_projection.t \
            t/model_round_based_final4_counts.t \
            t/model_update_points.t \
            t/pick_saver.t \
            t/player_all_sorting.t \
            t/view_TT.t
