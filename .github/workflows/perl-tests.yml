name: Perl tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.36'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cpanminus \
            libdbi-perl \
            libdbd-mysql-perl \
            libexpat1-dev \
            libssl-dev \
            zlib1g-dev

      - name: Bootstrap repo-local Perl environment
        run: |
          cpanm --notest local::lib
          eval "$(perl -Mlocal::lib=local)"
          cpanm --notest \
            Module::Install \
            Module::Install::Catalyst \
            Getopt::Long::Descriptive \
            MooseX::Getopt
          cpanm --notest --installdeps .

      - name: Run targeted validator test
        run: |
          chmod +x script/test-env.sh script/test || true
          script/test-env.sh prove -lv t/bracket_validator.t
